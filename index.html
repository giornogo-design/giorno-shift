<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シフト管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; padding-bottom: 70px; }

/* ローディング */
#loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
.spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #06c755; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #666; font-size: 14px; }

/* エラー */
#error-view { display: none; padding: 40px 20px; text-align: center; }
#error-msg { color: #e53e3e; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }

/* ヘッダー */
.header { background: #06c755; color: white; padding: 14px 16px; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header h1 { font-size: 17px; font-weight: bold; }
.header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* ボトムナビ */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 30; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.nav-btn { flex: 1; padding: 10px 4px 8px; border: none; background: none; font-size: 10px; color: #999; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; }
.nav-btn .icon { font-size: 22px; }
.nav-btn.active { color: #06c755; }

/* スタッフ情報 */
.staff-card { background: white; margin: 12px; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.staff-avatar { width: 40px; height: 40px; background: #06c755; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; flex-shrink: 0; }
.staff-name { font-weight: bold; font-size: 15px; }
.staff-sub { font-size: 12px; color: #888; margin-top: 2px; }

/* 店舗タブ */
.store-tabs { display: flex; margin: 0 12px 8px; gap: 8px; overflow-x: auto; }
.store-tabs::-webkit-scrollbar { display: none; }
.store-tab { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; border: 2px solid #ddd; background: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.store-tab.active { background: #06c755; border-color: #06c755; color: white; font-weight: bold; }

/* カレンダー */
.cal-wrap { margin: 0 12px 12px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #eee; }
.cal-header .month-lbl { font-size: 16px; font-weight: bold; }
.cal-nav { width: 36px; height: 36px; border: none; background: #f0f0f0; border-radius: 50%; font-size: 20px; cursor: pointer; }
.cal-nav:disabled { opacity: 0.3; cursor: default; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-dow { text-align: center; padding: 8px 0; font-size: 11px; color: #888; font-weight: bold; border-bottom: 1px solid #eee; }
.cal-dow:first-child { color: #e53e3e; }
.cal-dow:last-child  { color: #3182ce; }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 4px; cursor: pointer; border-bottom: 1px solid #f5f5f5; border-right: 1px solid #f5f5f5; transition: background 0.15s; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.empty { cursor: default; background: #fafafa; }
.cal-cell.past, .cal-cell.oor { opacity: 0.35; cursor: not-allowed; }
.cal-cell.selected { background: #e8faf0; }
.cal-cell.has-shift { background: #eef5ff; }
.cal-cell.short { background: #fff3e0; }
.cal-cell.today .day-num { background: #06c755; color: white; border-radius: 50%; }
.day-num { font-size: 13px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.cal-cell:nth-child(7n+1) .day-num { color: #e53e3e; }
.cal-cell:nth-child(7n)   .day-num { color: #3182ce; }
.shift-badge { font-size: 9px; color: #059c43; font-weight: bold; line-height: 1.1; text-align: center; }
.shift-exist-badge { font-size: 9px; color: #3182ce; font-weight: bold; line-height: 1.2; text-align: center; white-space: pre; }
.short-badge { font-size: 8px; color: #e67e22; font-weight: bold; line-height: 1.2; text-align: center; margin-top: 1px; }
.cal-cell.dayoff { background: #f0f0f0; }
.cal-cell.dholiday { background: #ffebee; }
.cal-cell.dopen { background: #e8faf0; }
.day-status { font-size: 9px; font-weight: bold; line-height: 1.2; margin-top: 1px; }
.day-status.off  { color: #999; }
.day-status.hol  { color: #e53e3e; }
.day-status.open { color: #06c755; }

/* 凡例 */
.legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 8px 16px; font-size: 11px; color: #666; border-top: 1px solid #f0f0f0; }
.legend span { display: inline-flex; align-items: center; gap: 4px; }
.legend .dot { width: 10px; height: 10px; border-radius: 3px; }

/* 選択リスト */
.selected-list { margin: 0 12px 12px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.section-title { padding: 12px 16px; font-weight: bold; font-size: 14px; color: #555; border-bottom: 1px solid #eee; background: #fafafa; }
.sel-item { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #f5f5f5; gap: 10px; }
.sel-item:last-child { border-bottom: none; }
.sel-date { font-weight: bold; font-size: 14px; min-width: 64px; }
.sel-time { font-size: 13px; color: #555; flex: 1; }
.btn-del-sel { width: 28px; height: 28px; background: #fff0f0; border: none; border-radius: 50%; color: #e53e3e; font-size: 16px; cursor: pointer; }
.empty-state { padding: 20px 16px; text-align: center; color: #aaa; font-size: 13px; }

/* 送信ボタン */
.submit-wrap { padding: 0 12px 12px; }
.btn-submit { width: 100%; padding: 15px; background: #06c755; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(6,199,85,0.35); }
.btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

/* 修正タブ */
.shift-list { margin: 0 12px 12px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.shift-item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
.shift-item:last-child { border-bottom: none; }
.shift-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.shift-date { font-weight: bold; font-size: 15px; }
.shift-store { font-size: 12px; background: #e8faf0; color: #059c43; padding: 2px 8px; border-radius: 10px; }
.shift-time { font-size: 14px; color: #555; }
.shift-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-edit { padding: 6px 14px; border: 2px solid #06c755; background: white; color: #06c755; border-radius: 20px; font-size: 13px; cursor: pointer; }
.btn-delete { padding: 6px 14px; border: 2px solid #e53e3e; background: white; color: #e53e3e; border-radius: 20px; font-size: 13px; cursor: pointer; }

/* 代理申請タブ */
.staff-picker { margin: 0 12px 12px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.staff-pick-item { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.staff-pick-item:last-child { border-bottom: none; }
.staff-pick-item:active { background: #f0f0f0; }
.staff-pick-name { font-weight: bold; font-size: 15px; }
.staff-pick-stores { font-size: 12px; color: #888; }
.staff-pick-arrow { color: #ccc; font-size: 18px; }

/* 月セレクタ */
.month-select-wrap { margin: 12px; display: flex; align-items: center; justify-content: space-between; background: white; border-radius: 12px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.month-select-lbl { font-weight: bold; font-size: 16px; }

/* 完了画面 */
#done-view { display: none; padding: 60px 24px; text-align: center; }
#done-view .check { font-size: 64px; margin-bottom: 16px; }
#done-view h2 { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
#done-view p { color: #666; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.btn-back { margin-top: 24px; padding: 13px 32px; background: #06c755; color: white; border: none; border-radius: 24px; font-size: 15px; cursor: pointer; }

/* モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-height: 80vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: bold; text-align: center; margin-bottom: 4px; }
.modal-sub   { font-size: 13px; color: #888; text-align: center; margin-bottom: 20px; }
.time-section { margin-bottom: 16px; }
.time-label   { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 8px; }
.time-presets { display: flex; flex-wrap: wrap; gap: 8px; }
.time-btn { padding: 8px 14px; border: 2px solid #e2e8f0; border-radius: 20px; background: white; font-size: 14px; cursor: pointer; }
.time-btn.selected { border-color: #06c755; background: #e8faf0; color: #059c43; font-weight: bold; }
.time-custom { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.time-custom input { flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; text-align: center; outline: none; }
.time-custom input:focus { border-color: #06c755; }
.modal-hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
.btn-confirm { width: 100%; padding: 14px; background: #06c755; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
.btn-cancel  { width: 100%; padding: 12px; background: #f5f5f5; color: #555; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>読み込み中...</p></div>
<div id="error-view"><p id="error-msg"></p><button class="btn-back" onclick="retryLogin()" style="margin-top:20px">再読み込み</button></div>

<div id="app" style="display:none">
  <!-- ヘッダー -->
  <div class="header">
    <h1 id="header-title">📅 シフト管理</h1>
    <div class="sub" id="header-sub"></div>
  </div>

  <!-- ① 申請タブ -->

        <div class="staff-name" id="staff-name-lbl"></div>

          <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>

          <span><span class="dot" style="background:#e8faf0;border:1px solid #06c755"></span>選択中</span>

    <div style="margin:0 12px 16px;padding:14px 16px;background:white;border-radius:12px;font-size:12px;color:#777;line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,0.08)">

<!-- 完了画面 -->

<!-- ボトムナビ -->

    <button class="btn-cancel"  id="edit-modal-cancel">キャンセル</button>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
const LIFF_ID       = '2010395925-JfheOL3d';
const GAS_URL       = 'https://script.google.com/macros/s/AKfycbx-aqsCqJuKL1F-eClOgwiZfmIQDfvyVHWXxA8AQJjk5o4TAabhxKQoKTaO9NrOUcec/exec';
const DOW           = ['日','月','火','水','木','金','土'];
const START_PRESETS = ['17:00','17:30','18:00','18:30','19:00','20:00'];
const END_PRESETS   = ['21:00','22:00','23:00','24:00','25:00','26:00','27:00'];
const STORE_NAME    = { S001:'片町店', S002:'駅前店', S003:'刻' };
const STORE_OPEN    = { S001:'19:00', S002:'18:00', S003:'16:30' };
const STORE_CLOSE   = { S001:'04:00', S002:'01:00', S003:'23:00' };

// ============================================================
// 状態
// ============================================================
let lineId = null, staffData = null;
let applyStore = null, applyMonth = new Date().getMonth()+1, applyYear = new Date().getFullYear();
let applySelected = {}, applyExisting = {}, applyShortage = {};
let editMonth = new Date().getMonth()+1, editYear = new Date().getFullYear();
let editShifts = [], editingShift = null;
let proxyTarget = null, proxyStore = null;
let proxyMonth = new Date().getMonth()+1, proxyYear = new Date().getFullYear();
let proxySelected = {}, proxyShortage = {};
let daysStore = null, daysMonth = new Date().getMonth()+1, daysYear = new Date().getFullYear();
let daysFixedOff = [], daysHolidays = new Set(), daysOpens = new Set();
let pendingDate = null, pendingMode = null;

// ============================================================
// GAS通信
// ============================================================
async function gasGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  const res  = await fetch(url);
  const text = await res.text();
  try { return JSON.parse(text); } catch(e) { throw new Error('GAS応答エラー: ' + text.slice(0,100)); }
}

// ============================================================

function setupApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('staff-name-lbl').textContent   = staffData.name + 'さん';

  if (staffData.isAdmin) {
    document.getElementById('nav-proxy').style.display = 'flex';
    document.getElementById('nav-days').style.display  = 'flex';
  }

  initApplyTab();
  document.getElementById('apply-submit').onclick = submitApply;
  document.getElementById('modal-confirm').onclick = confirmTime;
  document.getElementById('modal-cancel').onclick  = closeModal;
  document.getElementById('start-custom').oninput  = () => clearPresets('start');
  document.getElementById('end-custom').oninput    = () => clearPresets('end');
  document.getElementById('edit-modal-confirm').onclick = saveEditTime;
  document.getElementById('edit-modal-cancel').onclick  = () => document.getElementById('edit-modal').classList.remove('show');

    document.getElementById('done-view').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('bottom-nav').style.display = 'flex';
    if (pendingMode === 'edit') { loadEditShifts(); switchTab('edit'); }
    else if (pendingMode === 'proxy') { switchTab('proxy'); }
    else switchTab('apply');
  };
}

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(tab) {
  ['apply','edit','proxy','days'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
    const nav = document.getElementById('nav-'+t);
    if (nav) nav.classList.toggle('active', t===tab);
  });
  if (tab === 'edit') loadEditShifts();
  if (tab === 'proxy') loadProxyStaffList();
  if (tab === 'days') initDaysTab();
  document.getElementById('header-title').textContent =
    tab==='apply' ? '📅 シフト申請' : tab==='edit' ? '✏️ シフト修正' : tab==='proxy' ? '👥 代理申請' : '🗓 営業日設定';
}

function initApplyTab() {
  const tabs = document.getElementById('store-tabs-apply');
  tabs.innerHTML = '';
  staffData.stores.forEach((store, i) => {
    const btn = document.createElement('button');
    btn.className = 'store-tab' + (i===0?' active':'');
    btn.textContent = store.name;
    btn.onclick = () => { applyStore = store; document.querySelectorAll('#store-tabs-apply .store-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadApplyData(); };
    tabs.appendChild(btn);
  });
  applyStore = staffData.stores[0];
  document.getElementById('apply-prev').onclick = () => { applyMonth--; if(applyMonth<1){applyMonth=12;applyYear--;} loadApplyData(); };
  document.getElementById('apply-next').onclick = () => { applyMonth++; if(applyMonth>12){applyMonth=1;applyYear++;} loadApplyData(); };
  loadApplyData();
}

async function loadApplyData() {
  applyExisting = {}; applyShortage = {};
  renderApplyCal(); // 枠を即表示（データは後から反映）
  const [a, b] = await Promise.allSettled([
    gasGet({ action:'getShifts',  lineId, month: applyMonth }),
    gasGet({ action:'getShortage', storeId: applyStore.id, month: applyMonth }),
  ]);
  if (a.status==='fulfilled' && a.value.ok) a.value.shifts.filter(s=>s.storeId===applyStore.id).forEach(s => applyExisting[s.date]={start:s.start,end:s.end});
  if (b.status==='fulfilled' && b.value.ok) applyShortage = b.value.days;
  renderApplyCal();
}

function renderApplyCal() {
  document.getElementById('apply-month-lbl').textContent = `${applyYear}年${applyMonth}月`;
  const today = new Date(); today.setHours(0,0,0,0);
  const max   = new Date(today.getTime() + 62*24*60*60*1000);
  const grid  = document.getElementById('apply-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);
  const first = new Date(applyYear, applyMonth-1, 1).getDay();
  const last  = new Date(applyYear, applyMonth, 0).getDate();
  document.getElementById('apply-prev').disabled = new Date(applyYear,applyMonth-1,1) <= new Date(today.getFullYear(),today.getMonth(),1);
  for (let i=0;i<first;i++) { const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for (let d=1;d<=last;d++) {
    const dt = new Date(applyYear,applyMonth-1,d); const key=`${applyMonth}/${d}`;
    const isSel = !!(applySelected[key]?.storeId===applyStore?.id);
    const isEx  = !!applyExisting[key];
    const sh    = applyShortage[key];
    const isShort = !!(sh && !sh.ok);
    const isPast = dt<today, isOor=dt>max, isToday=dt.getTime()===today.getTime();
    const c = document.createElement('div');
    let cls = 'cal-cell';
    if (isPast||isOor) cls += ' oor';
    if (isToday)       cls += ' today';
    if (isSel)         cls += ' selected';
    else if (isEx)     cls += ' has-shift';
    else if (isShort && !isPast && !isOor) cls += ' short';
    c.className = cls;
    const num=document.createElement('div'); num.className='day-num'; num.textContent=d; c.appendChild(num);
    if (isEx && !isSel) {
      const b=document.createElement('div'); b.className='shift-exist-badge';
      const e=applyExisting[key]; b.textContent=e.start+'\n〜'+e.end; c.appendChild(b);
    } else if (isShort && !isSel && !isPast && !isOor) {
      const b=document.createElement('div'); b.className='short-badge';
      b.textContent = sh.shortage>0 ? 'あと'+sh.shortage : (sh.missingPro ? '熟練' : '募集'); c.appendChild(b);
    }
    if (isSel) { const b=document.createElement('div'); b.className='shift-badge'; const s=applySelected[key]; b.textContent=s.start+'〜'+s.end; c.appendChild(b); }
    if (!isPast&&!isOor) c.onclick=()=>tapApplyDate(applyMonth,d,key);
    grid.appendChild(c);
  }
}

function tapApplyDate(month,day,key) {
  if (applySelected[key]?.storeId===applyStore.id) { delete applySelected[key]; renderApplyCal(); renderApplyList(); updateApplyBtn(); return; }
  if (applyExisting[key]) {
    const dt=new Date(applyYear,month-1,day); const e=applyExisting[key];
    if (!confirm(`📅 ${month}/${day}（${DOW[dt.getDay()]}）のシフト\n${applyStore.name}\n\n🕒 ${e.start} 〜 ${e.end}\n\nこの日にもう一件 希望を追加しますか？`)) return;
  }
  pendingDate={month,day,key}; pendingMode='apply';
  openModal(month,day,applyStore);
}

async function submitApply() {
  const items = Object.values(applySelected).filter(s=>s.storeId===applyStore.id);
  if (!items.length) return;
  document.getElementById('apply-submit').disabled=true;
  document.getElementById('apply-submit').textContent='送信中...';
  try {
    const data = await gasGet({ action:'saveShift', lineId, storeId:applyStore.id, shifts:JSON.stringify(items) });
    showDone(applyStore.name, data.saved||[], data.errors||[], 'apply');
    items.forEach(s=>delete applySelected[`${s.month}/${s.day}`]);
  } catch(e) { alert('送信エラー: '+e.message); }
  updateApplyBtn();
}

function renderApplyList() {
  const items=Object.values(applySelected).filter(s=>s.storeId===applyStore?.id).sort((a,b)=>a.month!==b.month?a.month-b.month:a.day-b.day);
  const c=document.getElementById('apply-selected');
  if (!items.length) { c.innerHTML='<div class="empty-state">日付をタップして追加</div>'; return; }
  c.innerHTML='';
  items.forEach(s=>{ const key=`${s.month}/${s.day}`; const dt=new Date(applyYear,s.month-1,s.day); const row=document.createElement('div'); row.className='sel-item'; row.innerHTML=`<div class="sel-date">${s.month}/${s.day}（${DOW[dt.getDay()]}）</div><div class="sel-time">${s.start} 〜 ${s.end}</div><button class="btn-del-sel" onclick="delApplySel('${key}')">✕</button>`; c.appendChild(row); });
}
function delApplySel(key) { delete applySelected[key]; renderApplyCal(); renderApplyList(); updateApplyBtn(); }
function updateApplyBtn() { const n=Object.values(applySelected).filter(s=>s.storeId===applyStore?.id).length; const btn=document.getElementById('apply-submit'); btn.disabled=n===0; btn.textContent=`送信する（${n}件）`; }

async function loadEditShifts() {
  document.getElementById('edit-month-lbl').textContent = `${editYear}年${editMonth}月`;
  document.getElementById('edit-prev').onclick = () => { editMonth--; if(editMonth<1){editMonth=12;editYear--;} loadEditShifts(); };

  try {
    const data = await gasGet({ action:'getShiftsWithId', lineId, month:editMonth, year:editYear });

function renderEditList() {
  const list = document.getElementById('edit-list');
  if (!editShifts.length) { list.innerHTML='<div class="empty-state">この月のシフトはありません</div>'; return; }
  list.innerHTML='';
  editShifts.sort((a,b)=>{ const [am,ad]=a.date.split('/').map(Number); const [bm,bd]=b.date.split('/').map(Number); return am!==bm?am-bm:ad-bd; }).forEach(s=>{
    const [m,d]=s.date.split('/').map(Number); const dt=new Date(editYear,m-1,d);

function openEditModal(id,date,storeId,start,end) {
  editingShift={id,date,storeId};
  document.getElementById('edit-modal-title').textContent=`${date}の時間変更`;
  buildPresets2('edit-start',START_PRESETS,start);
  buildPresets2('edit-end',END_PRESETS,end);

  document.getElementById('edit-end-custom').value='';

async function saveEditTime() {
  const start=getTime2('edit-start'), end=getTime2('edit-end');

  if (!end)  {alert('終了時間を選択してください');return;}

    await gasGet({ action:'updateShiftWeb', lineId, id:editingShift.id, start, end });

async function confirmDelete(id,date) {

  try {
    await gasGet({ action:'deleteShiftWeb', lineId, id });
    await loadEditShifts();
  } catch(e) { alert('削除エラー: '+e.message); }
}

function initDaysTab() {
  const tabs = document.getElementById('store-tabs-days');
  if (!tabs.children.length) {
    staffData.stores.forEach((store, i) => {
      const btn = document.createElement('button');
      btn.className = 'store-tab' + (i===0?' active':'');
      btn.textContent = store.name;
      btn.onclick = () => { daysStore = store; document.querySelectorAll('#store-tabs-days .store-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); loadDaysData(); };
      tabs.appendChild(btn);
    });
    daysStore = staffData.stores[0];
    document.getElementById('days-prev').onclick = () => { daysMonth--; if(daysMonth<1){daysMonth=12;daysYear--;} loadDaysData(); };
    document.getElementById('days-next').onclick = () => { daysMonth++; if(daysMonth>12){daysMonth=1;daysYear++;} loadDaysData(); };
  }
  loadDaysData();
}

async function loadDaysData() {
  daysFixedOff = []; daysHolidays = new Set(); daysOpens = new Set();
  renderDaysCal(); // 枠を即表示
  try {
    const data = await gasGet({ action:'getDayStatus', lineId, storeId: daysStore.id, month: daysMonth });
    if (data.ok) {
      daysFixedOff = data.fixedOff || [];
      daysHolidays = new Set(data.holidays || []);
      daysOpens    = new Set(data.specialOpens || []);
    }
  } catch(e) {}
  renderDaysCal();
}

function renderDaysCal() {
  document.getElementById('days-month-lbl').textContent = `${daysYear}年${daysMonth}月`;
  const today = new Date(); today.setHours(0,0,0,0);
  const grid  = document.getElementById('days-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);
  const first = new Date(daysYear, daysMonth-1, 1).getDay();
  const last  = new Date(daysYear, daysMonth, 0).getDate();
  document.getElementById('days-prev').disabled = new Date(daysYear,daysMonth-1,1) <= new Date(today.getFullYear(),today.getMonth(),1);
  for (let i=0;i<first;i++) { const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for (let d=1;d<=last;d++) {
    const dt = new Date(daysYear,daysMonth-1,d); const key=`${daysMonth}/${d}`;
    const isPast = dt<today, isToday=dt.getTime()===today.getTime();
    const isOpen = daysOpens.has(key);
    const isHol  = daysHolidays.has(key);
    const isFix  = daysFixedOff.includes(dt.getDay());
    const c = document.createElement('div');
    let cls = 'cal-cell';
    if (isPast) cls += ' oor';
    if (isToday) cls += ' today';
    if (isOpen)      cls += ' dopen';
    else if (isHol)  cls += ' dholiday';
    else if (isFix)  cls += ' dayoff';
    c.className = cls;
    const num=document.createElement('div'); num.className='day-num'; num.textContent=d; c.appendChild(num);
    let label='', lcls='';
    if (isOpen)      { label='営業'; lcls='open'; }
    else if (isHol)  { label='休業'; lcls='hol'; }
    else if (isFix)  { label='定休'; lcls='off'; }
    if (label) { const b=document.createElement('div'); b.className='day-status '+lcls; b.textContent=label; c.appendChild(b); }
    if (!isPast) c.onclick=()=>tapDaysDate(d,key);
    grid.appendChild(c);
  }
}

async function tapDaysDate(day, key) {
  const dt = new Date(daysYear, daysMonth-1, day); const dow = dt.getDay();
  const isOpen = daysOpens.has(key), isHol = daysHolidays.has(key), isFix = daysFixedOff.includes(dow);
  let type, msg;
  if (isOpen)      { type='normal';  msg=`${daysMonth}/${day}（${DOW[dow]}）の臨時営業を取り消し、定休日に戻しますか？`; }
  else if (isHol)  { type='normal';  msg=`${daysMonth}/${day}（${DOW[dow]}）の臨時休業を取り消しますか？`; }
  else if (isFix)  { type='open';    msg=`${daysMonth}/${day}（${DOW[dow]}）は定休日です。\n${daysStore.name}を臨時営業にしますか？`; }
  else             { type='holiday'; msg=`${daysMonth}/${day}（${DOW[dow]}）の${daysStore.name}を臨時休業にしますか？`; }
  if (!confirm(msg)) return;
  try {
    await gasGet({ action:'setDayType', lineId, storeId:daysStore.id, month:daysMonth, day, type });
    await loadDaysData();
  } catch(e) { alert('変更エラー: '+e.message); }
}

// ============================================================
// 完了画面
// ============================================================
function showDone(label, saved, errors, mode) {
  pendingMode=mode;
  document.getElementById('app').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('done-view').style.display='block';
  let msg=label+'\n\n';
  if(saved.length) msg+=`✅ ${saved.join('、')} を登録しました！\n`;
  if(errors.length) msg+=`\n⚠️ スキップ：\n${errors.join('\n')}`;
  document.getElementById('done-msg').textContent=msg;
}

// ============================================================
// 時間モーダル（申請・代理共用）
// ============================================================
function openModal(month, day, store) {
  const year = pendingMode==='proxy' ? proxyYear : applyYear;
  const dt=new Date(year,month-1,day);
  document.getElementById('modal-title').textContent=`${month}/${day}（${DOW[dt.getDay()]}）`;
  document.getElementById('modal-sub').textContent=(store?.name||'')+ ' ' +(store?.open||'')+'〜'+(store?.close||'');
  buildPresets2('start', START_PRESETS, store?.open||'18:00');
  buildPresets2('end',   END_PRESETS,   store?.close||'24:00');
  document.getElementById('start-custom').value='';
  document.getElementById('end-custom').value='';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); pendingDate=null; }

function confirmTime() {
  const start=getTime2('start'), end=getTime2('end');
  if(!start){alert('開始時間を選んでください');return;}
  if(!end)  {alert('終了時間を選んでください');return;}
  const {month,day,key}=pendingDate;
  const entry={month,day,start,end,storeId:(pendingMode==='proxy'?proxyStore:applyStore).id};
  if(pendingMode==='proxy'){ proxySelected[key]=entry; document.getElementById('modal').classList.remove('show'); renderProxyCal(); }
  else { applySelected[key]=entry; document.getElementById('modal').classList.remove('show'); renderApplyCal(); renderApplyList(); updateApplyBtn(); }
  pendingDate=null;
}

// ============================================================
// ユーティリティ
// ============================================================
function buildPresets2(type, times, def) {
  const c=document.getElementById(type+'-presets'); c.innerHTML='';
  times.forEach(t=>{ const b=document.createElement('button'); b.className='time-btn'+(t===def?' selected':''); b.textContent=t; b.dataset.time=t; b.onclick=()=>{ document.querySelectorAll(`#${type}-presets .time-btn`).forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); document.getElementById(type+'-custom').value=''; }; c.appendChild(b); });
}
function clearPresets(type){ document.querySelectorAll(`#${type}-presets .time-btn`).forEach(b=>b.classList.remove('selected')); }
function getTime2(type){ const c=document.getElementById(type+'-custom').value.trim(); if(c)return c; const b=document.querySelector(`#${type}-presets .time-btn.selected`); return b?b.dataset.time:null; }

// ============================================================
// 起動
// ============================================================
init();
</script>
